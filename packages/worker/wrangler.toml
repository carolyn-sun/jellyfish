name = "jellyfish"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
workers_dev = false
preview_urls = false

routes = [
  { pattern = "jellyfishai.org", custom_domain = true }
]

[assets]
directory = "./public"

[[rules]]
type = "Text"
globs = ["**/*.html"]
fallbacks = []
fallthrough = true

[triggers]
crons = [ "* * * * *" ]

# ── KV Namespaces ──────────────────────────────────────────────────────────────
# Create with: npx wrangler kv namespace create AGENT_STATE
# Then replace the placeholder id below with the output id.
[[kv_namespaces]]
binding = "AGENT_STATE"
id = "dda7af076dd44a78811dadeae480d3d7"

# ── D1 Database ────────────────────────────────────────────────────────────────
# Create with: npx wrangler d1 create agent_saas
# Then copy the output into the fields below.
[[d1_databases]]
binding = "DB"
database_name = "agent_saas"
database_id = "13e065a3-b527-4613-8e8f-1ec7e1933d3f"

# ── Secrets (set via `npx wrangler secret put <NAME>`) ────────────────────────
# X_CLIENT_ID            — X App OAuth 2.0 Client ID (Platform-wide)
# X_CLIENT_SECRET        — X App OAuth 2.0 Client Secret (Platform-wide)
# ADMIN_SECRET           — Secret header value for protected admin dashboard
# CF_ACCOUNT_ID          — Cloudflare Account ID (visible in Cloudflare dashboard)
# CF_GATEWAY_NAME        — Cloudflare AI Gateway Name (e.g. "jellyfish-gateway")
# CF_AIG_TOKEN           — Cloudflare AI Gateway Token (generated in Gateway → Auth)
# GEMINI_MODEL           — (optional) Default model, e.g. gemini-3.1-pro-preview
# BEARER_TOKEN           — Twitter App-only Bearer Token, used by /api/distill (no user OAuth needed)
# DEPLOY_PASSCODE        — Gates /wizard (create+deploy flow); issue to paying users only

[vars]
GEMINI_MODEL = "gemini-3-flash-preview"
# GEMINI_MODEL = "gemini-3.1-pro-preview"
X_CLIENT_ID = "V1lOUm1BcWQ5bHB3V3UyalhNbXM6MTpjaQ"
CF_GATEWAY_NAME = "jellyfish-gateway"
CF_ACCOUNT_ID = "1805cb9294c475500bf37b8428d32fc5"

# Auth App for dashboard identity verification (separate from Agent App to avoid rotating refresh tokens)
# Set X_AUTH_CLIENT_ID here, then: wrangler secret put X_AUTH_CLIENT_SECRET
X_AUTH_CLIENT_ID = "dDZQdjQzTDc1UmxDck5JRC0wSWM6MTpjaQ"
# Subscription gate: set to "0" to disable Pro checks and grant all features for free.
# Useful for self-hosted / open deployments where you don’t want a paywall.

ENABLE_SUBSCRIPTIONS = "1"

# Custom Fine-Tuned Model Integration
# Set these to route LLM calls to your self-hosted vLLM/Ollama instance.
# ⚠️  When CUSTOM_LLM_URL is set, also set CUSTOM_LLM_MODEL to the model name
#    your server recognises (e.g. the folder name passed to vLLM --model).
#    If CUSTOM_LLM_MODEL is omitted, GEMINI_MODEL is used as the model name,
#    which will cause a 404 on any non-Google server.
# CUSTOM_LLM_URL   = "http://your-gpu-server-ip:8000/v1/chat/completions"
# CUSTOM_LLM_MODEL = "jellyfish-agent-lora"   # must match your served model name
# CUSTOM_LLM_KEY   = ""  # leave empty if your server has no auth
